    :root {
      --bg: #f7f3ea; --surface: #fffdf8; --ink: #1f1711; --muted: #6d6256;

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }

    .shell { max-width: 720px; margin: 0 auto; padding: 24px 32px 100px; }

    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .brand svg { width: 32px; height: 32px; }
    .brand span { font-size: 15px; font-weight: 700; color: var(--ink); }

    h1 { font-family: 'Instrument Serif', Georgia, serif; font-size: 32px; font-weight: 400; letter-spacing: -0.01em; line-height: 1.15; margin-bottom: 10px; }
    .subtitle { color: var(--muted); font-size: 15px; line-height: 1.5; margin-bottom: 24px; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
    .field .hint { color: var(--muted); font-weight: 400; }
    .field input, .field textarea { width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; font-size: 15px; color: var(--ink); background: var(--surface); outline: none; font-family: inherit; resize: none; transition: border-color 0.15s; }
    .field input:focus, .field textarea:focus { border-color: var(--accent); }
    .field input::placeholder, .field textarea::placeholder { color: var(--placeholder); }

    .btn { border: none; border-radius: 10px; padding: 12px 24px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm { padding: 10px 16px; font-size: 13px; border-radius: 8px; width: auto; min-height: 44px; display: inline-flex; align-items: center; justify-content: center; }
    .btn-approve { background: var(--green); color: #fff; }
    .btn-approve:hover { opacity: 0.9; }
    .btn-ghost { background: none; color: var(--muted); border: 1px solid var(--line); }
    .btn-ghost:hover { border-color: var(--ink); color: var(--ink); }

    .stepper { margin: 32px 0; }
    .step { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; }
    .step-dot { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--line); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; font-weight: 700; color: var(--muted); transition: all 0.3s; }
    .step.active .step-dot { border-color: var(--accent); color: var(--accent); animation: pulse 1.5s infinite; }
    .step.done .step-dot { border-color: var(--green); background: var(--green); color: #fff; }
    .step-label { font-size: 14px; color: var(--muted); padding-top: 2px; }
    .step.active .step-label { color: var(--ink); font-weight: 600; }
    .step.done .step-label { color: var(--green); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .draft-card { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 16px; margin-bottom: 12px; transition: opacity 0.2s, border-color 0.2s; }
    .draft-card.is-posting { opacity: 0.6; pointer-events: none; }
    .draft-card.is-posted { background: var(--green-bg); border-color: var(--green); }
    .draft-card.is-failed { border-color: var(--red); background: var(--red-bg); }
    .draft-card.is-approved { border-color: var(--green); background: var(--approved-bg); }
    .draft-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }

    .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--line); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: var(--muted); flex-shrink: 0; }

    .chip:hover { border-color: var(--red); color: var(--red); }
    .chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .strategy-bar { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }

    .post-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--line); padding: 12px; z-index: 10; }

    .post-bar-info strong { color: var(--ink); }

    .empty p { color: var(--muted); font-size: 14px; margin-top: 8px; }

    .toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--surface); padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; z-index: 100; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .toast.show { opacity: 1; }

    .edit-area { width: 100%; border: 1px solid var(--accent); border-radius: 8px; padding: 8px; font-size: 14px; color: var(--ink); background: var(--surface); resize: none; outline: none; font-family: inherit; margin-top: 6px; }

    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--line); }

    .legend { font-size: 12px; color: var(--muted); padding: 8px 0; display: flex; gap: 12px; flex-wrap: wrap; }

    .status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
    .status-posting { background: var(--direct-bg); color: var(--direct-text); }
    .status-posted { background: var(--green-bg); color: var(--green); }
    .status-failed { background: var(--red-bg); color: var(--red); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-sm { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--line); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }

    .success-banner { background: var(--green-bg); border: 1px solid var(--green); border-radius: 12px; padding: 16px; margin-bottom: 16px; text-align: center; }
    .success-banner h3 { color: var(--green); font-size: 16px; margin-bottom: 4px; }
    .success-banner p { color: var(--muted); font-size: 13px; }

    /* Hero */
    .hero h1 { font-size: 40px; line-height: 1.1; margin-bottom: 14px; }
    .hero-sub { font-size: 17px; color: var(--muted); line-height: 1.5; margin-bottom: 32px; max-width: 480px; }
    .hero-cta { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
    .hero-cta .btn-primary { width: auto; padding: 14px 32px; font-size: 16px; }
    .hero-cta-note { font-size: 13px; color: var(--muted); line-height: 1.4; }

    /* Demo preview */
    .hero-demo { margin: 0 0 24px; pointer-events: none; position: relative; }
    .hero-demo-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 8px; }
    .hero-demo .draft-card { margin-bottom: 0; transform: scale(0.92); transform-origin: top left; box-shadow: 0 4px 24px rgba(31,23,17,0.08); }

    /* Features */
    .hero-features { display: flex; gap: 24px; padding-top: 24px; border-top: 1px solid var(--line); }
    .hero-feature { flex: 1; }
    .hero-feature-title { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
    .hero-feature-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }
  </style>

<script>
let sid = null;
let product = null;
let allDrafts = [];
let screen = 'landing';
let postingInProgress = false;

const $ = s => document.getElementById(s);

function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

// Base path — works both locally (/) and behind Caddy (/x-marketing/)
const BASE = location.pathname.replace(/\/$/, '');

const api = async (m, p, b) => {
  try {
    const url = p.startsWith('/') ? BASE + p : p;
    const r = await fetch(url, { method: m, headers: {'Content-Type':'application/json'}, body: b ? JSON.stringify(b) : undefined });
    const data = await r.json();
    if (r.status === 429) { toast(data.error || 'Rate limit reached'); return null; }
    return data;
  } catch (e) {
    console.error('API error:', m, p, e.message);
    return null;
  }
};

function toast(m) {
  const t = $('toast');
  t.textContent = m;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

const typeLabels = { A: 'Helpful reply', B: 'Soft mention', C: 'Direct pitch' };
const typeClasses = { A: 'type-helpful', B: 'type-mention', C: 'type-direct' };

// ── Persistence ──
function save() {
  localStorage.setItem('xm_product', JSON.stringify(product));
  localStorage.setItem('xm_drafts', JSON.stringify(allDrafts));
}
function load() {
  try { product = JSON.parse(localStorage.getItem('xm_product')); } catch {}
  try { allDrafts = JSON.parse(localStorage.getItem('xm_drafts')) || []; } catch {}
  let changed = false;
  for (const d of allDrafts) {
    if (d.status === 'posting') { d.status = 'approved'; changed = true; }
  }
  if (changed) save();
}

// ── Engagement log (cross-session dedup) ──
function getEngagementLog() {
  try { return JSON.parse(localStorage.getItem('xm_engagement_log')) || []; } catch { return []; }
}

function logEngagement(draft, keyword) {
  const log = getEngagementLog();
  log.push({
    tweet_url: draft.tweet_url,
    author_handle: (draft.author_handle || '').toLowerCase(),
    keyword: keyword || '',
    reply_type: draft.reply_type || '',
    posted_at: new Date().toISOString(),
  });
  localStorage.setItem('xm_engagement_log', JSON.stringify(log));
}

function getEngagedAuthors() {
  return new Set(getEngagementLog().map(e => e.author_handle));
}

function getEngagedUrls() {
  return new Set(getEngagementLog().map(e => e.tweet_url));
}

async function checkBrowser() {
  try {
    const s = await api('GET', '/api/sessions');
    const c = (s?.sessions || []).find(x => x.status === 'connected');
    if (c) { sid = c.id; return true; }
  } catch {}
  return false;
}

async function init() {
  load();
  if (product && product.name) {
    screen = allDrafts.length > 0 ? 'feed' : 'strategy';
  }
  await checkBrowser();
  render();
}

// ── Render router ──
function render() {
  removePostBar();
  if (screen === 'landing') renderLanding();
  else if (screen === 'setup') renderSetup();
  else if (screen === 'strategy') renderStrategy();
  else if (screen === 'working') {}
  else renderFeed();
}

function removePostBar() {
  const el = document.querySelector('.post-bar');
  if (el) el.remove();
}

// ── Landing ──
function renderLanding() {
  if (typeof posthog !== 'undefined') posthog.capture('tool_landing_viewed');
  $('app').innerHTML = `
    <div class="hero">
      <h1>Find your next customers on X</h1>
      <p class="hero-sub">AI finds people talking about your problem on X and drafts replies. You approve, your Chrome posts.</p>

      <div class="hero-cta">
        <button class="btn btn-primary" onclick="screen='setup';render()">Try it free</button>
        <span class="hero-cta-note">5 minutes. No account.<br>You approve every reply.</span>
      </div>
      ${!/Chrome/.test(navigator.userAgent) || /Edg/.test(navigator.userAgent) ? '<p style="font-size:13px;color:var(--red);margin-top:8px">This tool requires Google Chrome. <a href="https://google.com/chrome" target="_blank" style="color:var(--accent)">Download Chrome</a></p>' : ''}

      <div class="hero-demo">
        <div class="draft-card">
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px">Found on X</div>
          <div class="draft-header">
            <div class="draft-author">
              <div class="avatar">S</div>
              <div>
                <div class="author-name">Sarah Chen <span class="author-handle">@sarahcodes</span></div>
                <div class="author-followers">4.2K followers</div>
              </div>
            </div>
          </div>
          <div class="original-tweet">anyone know a good tool for automating browser tasks? selenium feels ancient and playwright is overkill for what I need</div>
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin:12px 0 6px;display:flex;align-items:center;gap:8px"><span style="color:var(--green)">&#10038;</span> AI-drafted reply</div>
          <div class="draft-reply">honestly check out Hanzi Browse, it gives your AI agent a real browser. way simpler than selenium - browse.hanzilla.co</div>
          <div class="draft-actions">
            <span class="btn btn-approve btn-sm">Approve</span>
            <span class="btn btn-ghost btn-sm">Edit</span>
            <span class="btn btn-ghost btn-sm">Skip</span>
          </div>
        </div>
      </div>

      <div class="hero-features">
        <div class="hero-feature">
          <div class="hero-feature-title">Real browser, real account</div>
          <div class="hero-feature-desc">Posts from your logged-in Chrome. No fake accounts or API tokens.</div>
        </div>
        <div class="hero-feature">
          <div class="hero-feature-title">AI-drafted replies</div>
          <div class="hero-feature-desc">Sounds human, not like a bot. Matches the tone of each conversation.</div>
        </div>
        <div class="hero-feature">
          <div class="hero-feature-title">You stay in control</div>
          <div class="hero-feature-desc">Review, edit, or skip every reply before it goes live.</div>
        </div>
      </div>
    </div>
  `;
}

// ── Setup ──
function renderSetup() {
  $('app').innerHTML = `
    <h1>What are you building?</h1>
    <p class="subtitle">We'll find relevant conversations on X and draft replies for you.</p>

    <div class="field">
      <label for="f-name">Product name</label>
      <input id="f-name" placeholder="e.g. Hanzi Browse" value="${esc(product?.name)}" />
    </div>
    <div class="field">
      <label for="f-url">Website <span class="hint">(we'll read it for better results)</span></label>
      <input id="f-url" placeholder="https://..." value="${esc(product?.url)}" />
    </div>
    <div class="field">
      <label for="f-desc">Describe it in one sentence</label>
      <textarea id="f-desc" rows="2" placeholder="e.g. Give your AI agent a real browser">${esc(product?.description)}</textarea>
    </div>

    <button class="btn btn-primary" onclick="startFlow()">Generate my strategy</button>
    <button class="btn btn-ghost" onclick="screen='landing';render()" style="width:100%;margin-top:8px">Back</button>
  `;
}

// ── Phase 1: Analyze ──
async function startFlow() {
  if (typeof posthog !== 'undefined') posthog.capture('tool_setup_started');
  const name = $('f-name').value.trim();
  const url = $('f-url').value.trim();
  const desc = $('f-desc').value.trim();
  if (!name) return toast('Enter a product name');

  // If user provided a URL, ensure browser is connected so we can read it
  if (url && !sid) {
    const browserSid = await ensureBrowser();
    if (!browserSid) return toast('Browser needed to read your website');
  }

  screen = 'working';
  const steps = [
    { label: 'Analyzing your product', done: false, active: true },
    ...(url ? [{ label: 'Reading your website', done: false, active: false }] : []),
  ];

  function renderSteps() {
    $('app').innerHTML = `
      <h1>Generating strategy...</h1>
      <p class="subtitle">AI is analyzing your product to find the right audience on X.</p>
      <div class="stepper" role="progressbar">
        ${steps.map((s, i) => `
          <div class="step ${s.done ? 'done' : s.active ? 'active' : ''}">
            <div class="step-dot" aria-hidden="true">${s.done ? '\u2713' : i + 1}</div>
            <div class="step-label">${esc(s.label)}</div>
          </div>
        `).join('')}
      </div>
    `;
  }

  renderSteps();

  try {
    const analyzeResult = await api('POST', '/api/analyze', { name, url, description: desc });
    if (!analyzeResult || analyzeResult.error) throw new Error(analyzeResult?.error || 'Analysis failed');
    product = analyzeResult;
    steps[0].done = true;

    if (url) {
      // Only read the URL if browser is already connected — don't interrupt flow for new users
      if (sid || await checkBrowser()) {
        steps[1].active = true;
        renderSteps();
        try {
          const readResult = await api('POST', '/api/read-url', { browser_session_id: sid, url });
          if (readResult?.content) {
            const betterResult = await api('POST', '/api/analyze', { name, url, description: desc, page_content: readResult.content });
            if (betterResult && !betterResult.error) product = betterResult;
          }
        } catch (e) { console.log('URL read failed, using basic analysis'); }
        steps[1].done = true;
      }
    }

    save();
    screen = 'strategy';
    renderStrategy();
  } catch (err) {
    const msg = err.message || 'Unknown error';
    $('app').innerHTML = `
      <div class="draft-card is-failed">
        <h3 style="color:var(--red);margin-bottom:8px">Something went wrong</h3>
        <p style="font-size:14px;color:var(--ink);margin-bottom:12px">${esc(msg)}</p>
      </div>
      <button class="btn btn-primary" onclick="screen='setup';render()" style="margin-top:12px">Try again</button>
    `;
  }
}

// ── Strategy review ──
function renderStrategy() {
  const p = product;
  const log = getEngagementLog();
  const now = Date.now();
  const keywordStats = {};
  for (const entry of log) {
    if (!entry.keyword) continue;
    const k = entry.keyword.toLowerCase();
    if (!keywordStats[k]) keywordStats[k] = { total: 0, today: 0, week: 0 };
    keywordStats[k].total++;
    const age = now - new Date(entry.posted_at).getTime();
    if (age < 86400000) keywordStats[k].today++;
    if (age < 604800000) keywordStats[k].week++;
  }
  $('app').innerHTML = `
    <h1>Your strategy</h1>
    <p class="subtitle">Review keywords, then we'll search X.</p>

    <div class="draft-card">
      <div style="margin-bottom:12px">
        <div style="font-size:13px;color:var(--muted);margin-bottom:4px">Keywords <span style="font-weight:400">(click to remove)</span></div>
        <div class="chips" role="list" aria-label="Search keywords">
          ${(p.keywords || []).map((k, i) => {
            const stats = keywordStats[k.toLowerCase()];
            const hint = stats ? (stats.today > 0 ? stats.today + ' today' : stats.week > 0 ? stats.week + ' this week' : stats.total + ' all-time') : '';
            return `<span class="chip" role="button" tabindex="0" aria-label="Remove ${esc(k)}" onclick="removeKeyword(${i})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();removeKeyword(${i})}">${esc(k)}${hint ? ` <span style="color:var(--muted);font-size:11px;font-weight:400">(${hint})</span>` : ''} <span aria-hidden="true" style="margin-left:4px;opacity:0.5">&times;</span></span>`;
          }).join('')}
        </div>
        <div style="margin-top:8px;display:flex;gap:6px">
          <input id="new-keyword" placeholder="Add keyword..." aria-label="New keyword" style="flex:1;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:13px;background:var(--surface);color:var(--ink);outline:none;min-height:44px" onkeydown="if(event.key==='Enter'){addKeyword()}" />
          <button class="btn btn-ghost btn-sm" onclick="addKeyword()">Add</button>
        </div>
      </div>
      <div style="margin-bottom:12px">
        <div style="font-size:13px;color:var(--muted);margin-bottom:4px">Audience</div>
        <div style="font-size:14px">${esc(p.audience)}</div>
      </div>
      <div style="margin-bottom:12px">
        <div style="font-size:13px;color:var(--muted);margin-bottom:4px">Reply pitch</div>
        <div style="font-size:14px">${esc(p.product_pitch)}</div>
      </div>
      ${p.voice || p.pain_points ? `<details style="border-top:1px solid var(--line);padding-top:10px">
        <summary style="font-size:12px;color:var(--muted);cursor:pointer">Voice & pain points</summary>
        <div style="margin-top:8px;font-size:13px;color:var(--ink)">
          ${p.voice?.tone ? '<div style="margin-bottom:6px"><span style="color:var(--muted)">Tone:</span> ' + esc(p.voice.tone) + '</div>' : ''}
          ${p.voice?.style ? '<div style="margin-bottom:6px"><span style="color:var(--muted)">Style:</span> ' + esc(p.voice.style) + '</div>' : ''}
          ${p.pain_points?.length ? '<div><span style="color:var(--muted)">Pain points:</span> ' + p.pain_points.map(pp => esc(pp)).join(' · ') + '</div>' : ''}
        </div>
      </details>` : ''}
    </div>

    <div class="legend" aria-label="Reply types">
      <span><span class="type-tag type-helpful">Helpful</span> pure value</span>
      <span><span class="type-tag type-mention">Mention</span> value + product</span>
      <span><span class="type-tag type-direct">Direct</span> recommendation</span>
    </div>

    ${allDrafts.length > 0
      ? `<button class="btn btn-primary" onclick="screen='feed';render()" style="margin-top:8px">Back to drafts</button>
         <button class="btn btn-ghost" onclick="startSearch()" style="width:100%;margin-top:8px">Search again with these keywords</button>`
      : `<button class="btn btn-primary" onclick="startSearch()" style="margin-top:8px">Search X for conversations</button>`}
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-ghost" onclick="screen='setup';render()" style="flex:1">Edit product</button>
      <button class="btn btn-ghost" onclick="if(confirm('This will clear your product and all drafts.')){product=null;allDrafts=[];localStorage.clear();screen='landing';render()}" style="flex:1;font-size:13px;color:var(--muted)">Start over</button>
    </div>
  `;
}

function removeKeyword(idx) {
  product.keywords.splice(idx, 1);
  save(); renderStrategy();
}

function addKeyword() {
  const input = $('new-keyword');
  const val = input.value.trim();
  if (!val || product.keywords.includes(val)) return;
  product.keywords.push(val);
  save(); renderStrategy();
}

// ── Phase 2: Search + draft ──
let searchTimer = null;

async function startSearch() {
  screen = 'working';
  const keywords = (product.keywords || []).slice(0, 3);
  const kwStatus = keywords.map(k => ({ keyword: k, status: 'waiting', answer: null }));
  let phase = 'search'; // search | extract | draft

  function renderSearchProgress() {
    const elapsed = searchTimer ? Math.floor((Date.now() - searchTimer) / 1000) : 0;
    const min = Math.floor(elapsed / 60);
    const sec = String(elapsed % 60).padStart(2, '0');

    $('app').innerHTML = `
      <h1>Searching X...</h1>
      <p class="subtitle" style="display:flex;justify-content:space-between">
        <span>Your browser is searching X for conversations.</span>
        <span id="elapsed" style="font-variant-numeric:tabular-nums">${min}:${sec}</span>
      </p>

      <div style="margin:20px 0">
        ${kwStatus.map(k => `
          <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:4px;background:var(--surface);border-radius:8px;border:1px solid ${k.status === 'done' ? 'var(--green)' : k.status === 'error' ? 'var(--red)' : 'var(--line)'};font-size:14px">
            ${k.status === 'searching' ? '<span class="spinner-sm"></span>' :
              k.status === 'done' ? '<span style="color:var(--green);font-size:16px;font-weight:700;width:14px;text-align:center">\u2713</span>' :
              k.status === 'error' ? '<span style="color:var(--red);font-size:16px;font-weight:700;width:14px;text-align:center">\u2717</span>' :
              '<span style="color:var(--muted);width:14px;text-align:center">\u00b7</span>'}
            <span style="flex:1;${k.status === 'error' ? 'color:var(--muted)' : ''}">${esc(k.keyword)}</span>
            ${k.status === 'done' ? '<span style="color:var(--muted);font-size:12px">found tweets</span>' :
              k.status === 'error' ? '<span style="color:var(--muted);font-size:12px">timed out</span>' :
              k.status === 'searching' ? '<span style="color:var(--muted);font-size:12px">searching...</span>' : ''}
          </div>
        `).join('')}
      </div>

      ${phase === 'extract' ? '<p style="font-size:13px;color:var(--muted);text-align:center">Extracting tweets from results...</p>' :
        phase === 'draft' ? '<p style="font-size:13px;color:var(--muted);text-align:center">AI is drafting replies...</p>' : ''}

      <div style="margin-top:16px;text-align:center">
        <button class="btn btn-ghost btn-sm" style="font-size:12px;color:var(--red)" onclick="cancelSearch()">Stop search</button>
      </div>
    `;
  }

  // Start elapsed timer
  searchTimer = Date.now();
  const timerInterval = setInterval(() => {
    const el = document.getElementById('elapsed');
    if (el) {
      const s = Math.floor((Date.now() - searchTimer) / 1000);
      el.textContent = Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    }
  }, 1000);

  renderSearchProgress();

  try {
    // Re-check for fresh session
    sid = null;
    await checkBrowser();
    const browserSid = sid || await ensureBrowser();
    if (!browserSid) { clearInterval(timerInterval); throw new Error('Browser not connected'); }

    renderSearchProgress();

    // Search each keyword in parallel, update UI as each completes
    const promises = keywords.map(async (keyword, i) => {
      kwStatus[i].status = 'searching';
      renderSearchProgress();
      try {
        const result = await api('POST', '/api/search-one', { browser_session_id: browserSid, keyword });
        if (result?.status === 'complete' && result.answer && result.answer.length > 50) {
          kwStatus[i].status = 'done';
          kwStatus[i].answer = result.answer;
        } else {
          kwStatus[i].status = 'error';
        }
      } catch {
        kwStatus[i].status = 'error';
      }
      renderSearchProgress();
    });

    await Promise.allSettled(promises);

    // Combine successful results
    const summaries = kwStatus
      .filter(k => k.status === 'done' && k.answer)
      .map(k => `--- Results for "${k.keyword}" ---\n${k.answer}`)
      .join('\n\n');

    if (!summaries) { clearInterval(timerInterval); throw new Error('No tweets found across any keyword. Try different keywords.'); }

    // Extract tweets
    phase = 'extract';
    renderSearchProgress();
    const extractResult = await api('POST', '/api/extract', { summaries });
    if (!extractResult?.tweets?.length) { clearInterval(timerInterval); throw new Error('Could not extract tweets from results.'); }

    // Draft replies
    phase = 'draft';
    renderSearchProgress();
    const draftResult = await api('POST', '/api/draft', { tweets: extractResult.tweets, product });
    if (!draftResult || draftResult.error) { clearInterval(timerInterval); throw new Error(draftResult?.error || 'Drafting failed'); }

    clearInterval(timerInterval);

    const engagedUrls = getEngagedUrls();
    const engagedAuthors = getEngagedAuthors();
    allDrafts = (draftResult.drafts || []).filter(d => {
      const reply = (d.reply_text || '').toLowerCase();
      if (reply.startsWith('skip') || reply.includes('bot account') || reply.includes('not recommended')) return false;
      if (engagedUrls.has(d.tweet_url)) return false;
      if (engagedAuthors.has((d.author_handle || '').toLowerCase())) return false;
      return true;
    });

    if (allDrafts.length === 0 && (draftResult.drafts || []).length > 0) {
      clearInterval(timerInterval);
      const log = getEngagementLog();
      $('app').innerHTML = `
        <div class="draft-card">
          <h3 style="margin-bottom:8px">All caught up</h3>
          <p style="font-size:14px;color:var(--muted);margin-bottom:12px">
            All ${draftResult.drafts.length} conversations found were already engaged (${log.length} replies all-time).
            Try adding new keywords or come back later for fresh tweets.
          </p>
        </div>
        <button class="btn btn-primary" onclick="screen='strategy';render()" style="margin-top:12px">Edit keywords</button>
      `;
      return;
    }

    const searchKeywords = keywords.join(', ');
    for (const d of allDrafts) d._searchKeywords = searchKeywords;

    save();
    toast(allDrafts.length + ' drafts ready!');
    screen = 'feed';
    render();
  } catch (err) {
    clearInterval(timerInterval);
    const msg = err.message || 'Unknown error';
    $('app').innerHTML = `
      <div class="draft-card is-failed">
        <h3 style="color:var(--red);margin-bottom:8px">Search failed</h3>
        <p style="font-size:14px;color:var(--ink);margin-bottom:12px">${esc(msg)}</p>
        ${msg.includes('Rate limit') || msg.includes('429') ? '<p style="font-size:13px;color:var(--muted)">Daily limit reached. Come back tomorrow or <a href="https://browse.hanzilla.co" target="_blank" style="color:var(--accent)">get your own key</a>.</p>' : ''}
        ${msg.includes('Browser') || msg.includes('connected') ? '<p style="font-size:13px;color:var(--muted)">Make sure the Hanzi Browse extension is running.</p>' : ''}
      </div>
      <button class="btn btn-primary" onclick="startSearch()" style="margin-top:12px">Try again</button>
      <button class="btn btn-ghost" onclick="screen='strategy';render()" style="margin-top:8px;width:100%">Edit keywords</button>
    `;
  }
}

// ── Browser connection ──
async function ensureBrowser() {
  if (sid) return sid;

  // Check if already connected before showing pairing UI
  if (await checkBrowser()) return sid;

  return new Promise(resolve => {
    if (typeof HanziConnect !== 'undefined') {
      $('app').innerHTML = `
        <h1>Connect your browser</h1>
        <p class="subtitle">This tool needs the Hanzi Browse extension to search and post on X.</p>
        <div id="hanzi-pair-widget" style="max-width:440px"></div>
        <button class="btn btn-ghost btn-sm" id="refresh-connection" style="margin-top:12px;width:100%" onclick="this.textContent='Checking...';this.disabled=true">I've completed pairing \u2014 check again</button>
      `;
      HanziConnect.mount('#hanzi-pair-widget', {
        apiKey: 'hic_pub_proxy', // proxied through our Express server — see /v1/browser-sessions routes
        apiUrl: BASE,
        purpose: 'search X and post replies on your behalf',
        onConnected: (sessionId) => {
          sid = sessionId;
          toast('Browser connected!');
          resolve(sid);
        },
        onDisconnected: () => {
          sid = null;
          toast('Browser disconnected — please reconnect');
        },
      });
      // Manual refresh button as fallback
      $('refresh-connection').onclick = async function() {
        this.textContent = 'Checking...';
        this.disabled = true;
        if (await checkBrowser()) {
          toast('Browser connected!');
          resolve(sid);
        } else {
          this.textContent = 'Not found \u2014 try again';
          this.disabled = false;
        }
      };
    } else {
      $('app').innerHTML = `
        <div class="draft-card" style="text-align:center;max-width:400px;margin:24px auto">
          <h3 style="margin-bottom:8px">Connect your browser</h3>
          <p style="color:var(--muted);font-size:14px;margin-bottom:16px">Install the <a href="https://browse.hanzilla.co" target="_blank" style="color:var(--accent);font-weight:600">Hanzi Browse</a> extension, then pair it.</p>
          <button class="btn btn-primary" style="width:auto" id="pair-fallback">Pair browser</button>
          <div id="pair-status" style="margin-top:10px;font-size:13px;color:var(--muted)" role="status"></div>
        </div>`;
      $('pair-fallback').onclick = async () => {
        $('pair-status').textContent = 'Opening pairing link...';
        const d = await api('POST', '/api/pair');
        if (!d?.pairing_url) { $('pair-status').textContent = 'Failed.'; resolve(null); return; }
        window.open(d.pairing_url, '_blank');
        $('pair-status').textContent = 'Complete pairing in the new tab...';
        for (let i = 0; i < 60; i++) {
          await new Promise(r => setTimeout(r, 2000));
          if (await checkBrowser()) { toast('Connected!'); resolve(sid); return; }
        }
        $('pair-status').textContent = 'Timed out. Try again.';
        resolve(null);
      };
    }
  });
}

async function cancelSearch() {
  try { await api('POST', '/api/cancel-search', { browser_session_id: sid }); } catch {}
  toast('Search cancelled');
  screen = 'strategy';
  render();
}

// ── Feed ──
function renderFeed() {
  const pending = allDrafts.filter(d => d.status === 'pending');
  const approved = allDrafts.filter(d => d.status === 'approved');
  const posting = allDrafts.filter(d => d.status === 'posting');
  const posted = allDrafts.filter(d => d.status === 'posted');
  const failed = allDrafts.filter(d => d.status === 'failed');
  const actionable = pending.length + approved.length + posting.length;

  if (allDrafts.length === 0) {
    $('app').innerHTML = `
      <div class="empty">
        <h1>Ready to scout</h1>
        <p>Search X for conversations about ${esc(product?.name || 'your product')}.</p>
        <button class="btn btn-primary" style="margin-top:20px;max-width:240px;margin-left:auto;margin-right:auto" onclick="startSearch()">Find conversations</button>
      </div>`;
    return;
  }

  let html = `
    <div class="strategy-bar">
      <div class="strategy-bar-info">
        <strong>${esc(product?.name)}</strong> &middot;
        ${actionable > 0 ? actionable + ' to review' : ''}
        ${actionable > 0 && posted.length > 0 ? ', ' : ''}
        ${posted.length > 0 ? posted.length + ' posted' : ''}
        ${actionable === 0 && posted.length === 0 && failed.length > 0 ? failed.length + ' failed' : ''}
        ${(() => { const total = getEngagementLog().length; return total > 0 ? ` &middot; ${total} all-time` : ''; })()}
      </div>
      <div style="display:flex;gap:6px">
        ${pending.length > 0 ? `<button class="btn btn-approve btn-sm" onclick="approveAll()">Approve all</button>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="screen='strategy';render()" ${postingInProgress ? 'disabled' : ''}>Keywords</button>
      </div>
    </div>
  `;

  if (posted.length > 0 && actionable === 0 && failed.length === 0) {
    html += `
      <div class="success-banner">
        <h3>\u2713 ${posted.length} ${posted.length === 1 ? 'reply' : 'replies'} posted</h3>
        <p>Your replies are live on X.</p>
      </div>
      <button class="btn btn-primary" onclick="startSearch()" style="margin-bottom:16px">Find more conversations</button>
    `;
  }

  if (failed.length > 0) {
    html += '<div class="divider">Failed</div>';
    html += failed.map(d => renderDraftCard(d)).join('');
  }
  if (posting.length > 0) {
    html += '<div class="divider">Posting</div>';
    html += posting.map(d => renderDraftCard(d)).join('');
  }
  const reviewable = [...approved, ...pending];
  if (reviewable.length > 0) {
    if (failed.length > 0 || posting.length > 0 || posted.length > 0) html += '<div class="divider">To review</div>';
    html += reviewable.map(d => renderDraftCard(d)).join('');
  }
  if (posted.length > 0 && actionable > 0) {
    html += '<div class="divider">Posted</div>';
    html += posted.map(d => renderDraftCard(d)).join('');
  }

  $('app').innerHTML = html;

  if (approved.length > 0 && !postingInProgress) {
    const bar = document.createElement('div');
    bar.className = 'post-bar';
    bar.innerHTML = `<div class="post-bar-inner">
      <div class="post-bar-info"><strong>${approved.length}</strong> approved</div>
      <button class="btn btn-approve btn-sm" onclick="confirmPost()">Post all</button>
    </div>`;
    document.body.appendChild(bar);
  }
}

function renderDraftCard(d) {
  const initials = (d.author_name || '?')[0].toUpperCase();
  const typeLabel = typeLabels[d.reply_type] || d.reply_type || '';
  const typeClass = typeClasses[d.reply_type] || 'type-helpful';
  const status = d.status;

  let cardClass = '';
  if (status === 'posting') cardClass = 'is-posting';
  else if (status === 'posted') cardClass = 'is-posted';
  else if (status === 'failed') cardClass = 'is-failed';
  else if (status === 'approved') cardClass = 'is-approved';

  let badge = '';
  if (status === 'posting') badge = '<span class="status-badge status-posting"><span class="spinner-sm"></span> Posting</span>';
  else if (status === 'posted') badge = `<span class="status-badge status-posted">\u2713 Posted${d.posted_at ? ' \u00b7 ' + new Date(d.posted_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : ''}</span>`;
  else if (status === 'failed') badge = '<span class="status-badge status-failed">Failed</span>';

  let actions = '';
  if (status === 'posted') {
    actions = `<a href="${esc(d.tweet_url)}" target="_blank" class="btn btn-ghost btn-sm" style="text-decoration:none">View on X</a>`;
  } else if (status === 'failed') {
    actions = `<button class="btn btn-sm" style="background:var(--red);color:#fff" onclick="retryPost('${esc(d.id)}')">Retry</button>
      <button class="btn btn-ghost btn-sm" onclick="skip('${esc(d.id)}')">Dismiss</button>`;
  } else if (status === 'posting') {
    actions = '';
  } else if (status === 'approved') {
    actions = `<button class="btn btn-sm" style="background:var(--green-bg);color:var(--green)" onclick="unapprove('${esc(d.id)}')">\u2713 Approved <span style="opacity:0.5;margin-left:4px;font-weight:400">undo</span></button>`;
  } else {
    actions = `<button class="btn btn-approve btn-sm" onclick="approve('${esc(d.id)}')">Approve</button>
      <button class="btn btn-ghost btn-sm" onclick="editDraft('${esc(d.id)}')">Edit</button>
      <button class="btn btn-ghost btn-sm" onclick="skip('${esc(d.id)}')">Skip</button>`;
  }

  return `
  <div class="draft-card ${cardClass}" id="d-${esc(d.id)}">
    <div class="draft-header">
      <div class="draft-author">
        <div class="avatar" aria-hidden="true">${esc(initials)}</div>
        <div>
          <div class="author-name">${esc(d.author_name || 'Unknown')} <span class="author-handle">${esc(d.author_handle)}</span></div>
          ${d.author_followers ? `<div class="author-followers">${esc(Number(d.author_followers).toLocaleString())} followers</div>` : ''}
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        ${badge}
        ${typeLabel ? `<span class="type-tag ${typeClass}">${esc(typeLabel)}</span>` : ''}
      </div>
    </div>
    <div class="original-tweet">${esc(d.tweet_text)}</div>
    <div class="draft-reply" id="reply-${esc(d.id)}">${esc(d.reply_text)}</div>
    ${d.reasoning ? `<details style="margin-bottom:8px"><summary style="font-size:12px;color:var(--muted);cursor:pointer">Why this tweet</summary><div class="draft-meta" style="margin-top:4px">${esc(d.reasoning)}</div></details>` : ''}
    <div class="draft-actions">${actions}</div>
  </div>`;
}

// ── Actions ──
function approveAll() {
  const count = allDrafts.filter(d => d.status === 'pending').length;
  for (const d of allDrafts) {
    if (d.status === 'pending') d.status = 'approved';
  }
  if (typeof posthog !== 'undefined') posthog.capture('draft_approve_all', { count });
  save(); render();
}

function approve(id) {
  const d = allDrafts.find(x => x.id === id);
  if (d) d.status = 'approved';
  if (typeof posthog !== 'undefined') posthog.capture('draft_approved');
  save(); render();
}

function unapprove(id) {
  const d = allDrafts.find(x => x.id === id);
  if (d) d.status = 'pending';
  save(); render();
}

function editDraft(id) {
  const d = allDrafts.find(x => x.id === id);
  if (!d) return;
  const el = document.getElementById('reply-' + id);
  if (!el) return;
  el.innerHTML = `<textarea class="edit-area" id="ea-${esc(id)}" rows="3">${esc(d.reply_text)}</textarea>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-approve btn-sm" onclick="saveEdit('${esc(id)}')">Save & approve</button>
      <button class="btn btn-ghost btn-sm" onclick="render()">Cancel</button>
    </div>`;
  const ta = document.getElementById('ea-' + id);
  if (ta) ta.focus();
}

function saveEdit(id) {
  const ta = document.getElementById('ea-' + id);
  if (!ta) return;
  const text = ta.value.trim();
  if (!text) return;
  const d = allDrafts.find(x => x.id === id);
  if (d) { d.reply_text = text; d.status = 'approved'; }
  save(); render();
}

function skip(id) {
  allDrafts = allDrafts.filter(x => x.id !== id);
  save(); toast('Skipped'); render();
}

// ── Posting ──
function confirmPost() {
  const approved = allDrafts.filter(d => d.status === 'approved');
  if (!approved.length) return;
  const bar = document.querySelector('.post-bar-inner');
  if (!bar) return;
  const est = approved.length * 30;
  bar.innerHTML = `
    <div style="font-size:13px;color:var(--ink);line-height:1.4">
      Post <strong>${approved.length}</strong> ${approved.length === 1 ? 'reply' : 'replies'} to X?<br>
      <span style="color:var(--muted)">~${est}s total</span>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="render()">Cancel</button>
      <button class="btn btn-sm" style="background:var(--accent);color:#fff" onclick="postAll()">Post now</button>
    </div>
  `;
}

async function postAll() {
  const approved = allDrafts.filter(d => d.status === 'approved');
  if (!approved.length) return;
  const browserSid = sid || await ensureBrowser();
  if (!browserSid) return toast('Browser needed');

  postingInProgress = true;
  for (const d of approved) d.status = 'posting';
  save(); render();

  let ok = 0, fail = 0;
  // Fire all posts in parallel — each gets its own browser tab
  const results = await Promise.allSettled(approved.map(d =>
    api('POST', '/api/post', {
      browser_session_id: browserSid,
      tweet_url: d.tweet_url,
      reply_text: d.reply_text,
    })
  ));
  results.forEach((r, i) => {
    if (r.status === 'fulfilled' && r.value?.result === 'complete') {
      approved[i].status = 'posted';
      approved[i].posted_at = new Date().toISOString();
      logEngagement(approved[i], approved[i]._searchKeywords);
      ok++;
    } else {
      approved[i].status = 'failed';
      fail++;
    }
  });
  save(); render();

  postingInProgress = false;
  save();
  if (ok > 0 && fail === 0) toast(ok + (ok === 1 ? ' reply' : ' replies') + ' posted!');
  else if (ok > 0) toast(ok + ' posted, ' + fail + ' failed');
  else toast('Posting failed');
  render();
}

async function retryPost(id) {
  const d = allDrafts.find(x => x.id === id);
  if (!d) return;
  const browserSid = sid || await ensureBrowser();
  if (!browserSid) return toast('Browser needed');
  d.status = 'posting';
  save(); render();
  const result = await api('POST', '/api/post', {
    browser_session_id: browserSid,
    tweet_url: d.tweet_url,
    reply_text: d.reply_text,
  });
  if (result && result.result === 'complete') {
    d.status = 'posted'; d.posted_at = new Date().toISOString(); logEngagement(d, d._searchKeywords); toast('Posted!');
  } else {
    d.status = 'failed'; toast('Failed');
  }
  save(); render();
}

init();
</script>
</body>
</html>
